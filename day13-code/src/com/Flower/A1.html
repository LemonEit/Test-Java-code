<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>七彩鲜花销售管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 40px;
            background: #f8f9fa;
        }

        .menu-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 25px 20px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .menu-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .menu-btn:active {
            transform: translateY(-2px);
        }

        .content-area {
            padding: 40px;
            min-height: 400px;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #dee2e6;
        }

        tbody tr:hover {
            background: #f8f9fa;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #495057;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #dee2e6;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .action-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-right: 10px;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .delete-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 30px;
            border-radius: 10px;
            max-width: 600px;
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.3);
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: #000;
        }

        .message {
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .back-btn {
            background: #6c757d;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🌸 七彩鲜花销售管理系统 🌸</h1>
    </div>

    <!-- 主菜单 -->
    <div class="menu-container" id="mainMenu">
        <button class="menu-btn" onclick="showAllOrders()">📋 查询销售订单</button>
        <button class="menu-btn" onclick="showUpdateForm()">✏️ 修改销售订单</button>
        <button class="menu-btn" onclick="showDeleteForm()">🗑️ 删除销售订单</button>
        <button class="menu-btn" onclick="showAddForm()">➕ 添加销售订单</button>
        <button class="menu-btn" onclick="exitSystem()">🚪 退出系统</button>
    </div>

    <!-- 内容区域 -->
    <div class="content-area" id="contentArea" style="display: none;">
        <button class="action-btn back-btn" onclick="backToMenu()">← 返回主菜单</button>
        <div id="dynamicContent"></div>
    </div>
</div>

<!-- 确认对话框 -->
<div class="modal" id="confirmModal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h3 id="modalTitle">确认操作</h3>
        <p id="modalMessage" style="margin: 20px 0;"></p>
        <button class="action-btn" onclick="confirmAction()">确认</button>
        <button class="action-btn" onclick="closeModal()" style="background: #6c757d;">取消</button>
    </div>
</div>

<script>
    // 模拟后端数据
    let orders = [
        {ID: 1001, FlowerName: "金色海岸 - 香槟玫瑰", jiage: 318, shuliang: 10, Date: "2018-12-12", yuango: "王二"},
        {ID: 1002, FlowerName: "初心永不变 - 白玫瑰", jiage: 538, shuliang: 99, Date: "2018-2-2", yuango: "张星宇"},
        {ID: 1003, FlowerName: "梦里花开紫色桔梗", jiage: 123, shuliang: 40, Date: "2018-12-16", yuango: "王二"},
        {ID: 1004, FlowerName: "心花怒放 - 粉色百合", jiage: 188, shuliang: 120, Date: "2016-12-11", yuango: "王二"},
        {ID: 1005, FlowerName: "致青春 -·无声的爱", jiage: 219, shuliang: 1000, Date: "2016-12-15", yuango: "张星宇"}
    ];

    let currentOperation = null;
    let currentOrderId = null;

    // 显示所有订单
    function showAllOrders() {
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('contentArea').style.display = 'block';

        let html = '<h2>📋 所有销售订单</h2>';
        html += '<div class="table-container"><table>';
        html += '<thead><tr><th>订单编号</th><th>鲜花名称</th><th>鲜花价格</th><th>销售数量</th><th>订单日期</th><th>销售人员</th></tr></thead>';
        html += '<tbody>';

        orders.forEach(order => {
            html += `<tr>
                    <td>${order.ID}</td>
                    <td>${order.FlowerName}</td>
                    <td>¥${order.jiage}</td>
                    <td>${order.shuliang}</td>
                    <td>${order.Date}</td>
                    <td>${order.yuango}</td>
                </tr>`;
        });

        html += '</tbody></table></div>';
        html += '<div style="margin-top: 20px; padding: 15px; background: #e7f3ff; border-radius: 5px;">';
        html += `<strong>共计 ${orders.length} 个订单</strong></div>`;

        document.getElementById('dynamicContent').innerHTML = html;
    }

    // 显示添加表单
    function showAddForm() {
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('contentArea').style.display = 'block';

        let html = '<h2>➕ 添加销售订单</h2>';
        html += '<form onsubmit="addOrder(event)" style="max-width: 500px;">';
        html += '<div class="form-group"><label>订单编号：</label><input type="number" id="addId" required></div>';
        html += '<div class="form-group"><label>鲜花名称：</label><input type="text" id="addFlowerName" required></div>';
        html += '<div class="form-group"><label>鲜花价格：</label><input type="number" id="addPrice" required></div>';
        html += '<div class="form-group"><label>销售数量：</label><input type="number" id="addQuantity" required></div>';
        html += '<div class="form-group"><label>订单日期：</label><input type="date" id="addDate" required></div>';
        html += '<div class="form-group"><label>销售人员：</label><input type="text" id="addSalesman" required></div>';
        html += '<button type="submit" class="action-btn">添加订单</button>';
        html += '</form>';

        document.getElementById('dynamicContent').innerHTML = html;
    }

    // 显示删除表单
    function showDeleteForm() {
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('contentArea').style.display = 'block';

        let html = '<h2>🗑️ 删除销售订单</h2>';
        html += '<div class="form-group"><label>请输入要删除的订单编号：</label>';
        html += '<input type="number" id="deleteId" placeholder="输入订单编号"></div>';
        html += '<button class="action-btn delete-btn" onclick="deleteOrder()">删除订单</button>';

        document.getElementById('dynamicContent').innerHTML = html;
    }

    // 显示修改表单
    function showUpdateForm() {
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('contentArea').style.display = 'block';

        let html = '<h2>✏️ 修改销售订单</h2>';
        html += '<div class="form-group"><label>请输入要修改的订单编号：</label>';
        html += '<input type="number" id="updateSearchId" placeholder="输入订单编号"></div>';
        html += '<button class="action-btn" onclick="findOrderToUpdate()">查找订单</button>';

        document.getElementById('dynamicContent').innerHTML = html;
    }

    // 查找要修改的订单
    function findOrderToUpdate() {
        const id = parseInt(document.getElementById('updateSearchId').value);
        const order = orders.find(o => o.ID === id);

        if (!order) {
            showMessage('未找到该订单', 'error');
            return;
        }

        currentOrderId = id;
        let html = '<h3>修改订单信息</h3>';
        html += '<div style="background: #f8f9fa; padding: 15px; margin: 20px 0; border-radius: 5px;">';
        html += '<p><strong>原订单信息：</strong></p>';
        html += `<p>订单编号：${order.ID}</p>`;
        html += `<p>鲜花名称：${order.FlowerName}</p>`;
        html += `<p>鲜花价格：¥${order.jiage}</p>`;
        html += `<p>销售数量：${order.shuliang}</p>`;
        html += `<p>订单日期：${order.Date}</p>`;
        html += `<p>销售人员：${order.yuango}</p></div>`;

        html += '<form onsubmit="updateOrder(event)" style="max-width: 500px;">';
        html += '<div class="form-group"><label>鲜花名称：</label><input type="text" id="updateFlowerName" value="' + order.FlowerName + '" required></div>';
        html += '<div class="form-group"><label>鲜花价格：</label><input type="number" id="updatePrice" value="' + order.jiage + '" required></div>';
        html += '<div class="form-group"><label>销售数量：</label><input type="number" id="updateQuantity" value="' + order.shuliang + '" required></div>';
        html += '<div class="form-group"><label>订单日期：</label><input type="date" id="updateDate" value="' + order.Date + '" required></div>';
        html += '<div class="form-group"><label>销售人员：</label><input type="text" id="updateSalesman" value="' + order.yuango + '" required></div>';
        html += '<button type="submit" class="action-btn">确认修改</button>';
        html += '</form>';

        document.getElementById('dynamicContent').innerHTML = html;
    }

    // 添加订单
    function addOrder(event) {
        event.preventDefault();

        const newOrder = {
            ID: parseInt(document.getElementById('addId').value),
            FlowerName: document.getElementById('addFlowerName').value,
            jiage: parseInt(document.getElementById('addPrice').value),
            shuliang: parseInt(document.getElementById('addQuantity').value),
            Date: document.getElementById('addDate').value,
            yuango: document.getElementById('addSalesman').value
        };

        orders.push(newOrder);
        showMessage('添加成功！', 'success');
        setTimeout(() => showAllOrders(), 1500);
    }

    // 删除订单
    function deleteOrder() {
        const id = parseInt(document.getElementById('deleteId').value);
        const index = orders.findIndex(o => o.ID === id);

        if (index === -1) {
            showMessage('未找到该订单', 'error');
            return;
        }

        currentOperation = 'delete';
        currentOrderId = index;
        showModal('确认删除', `确定要删除订单编号为 ${id} 的订单吗？`);
    }

    // 更新订单
    function updateOrder(event) {
        event.preventDefault();

        const index = orders.findIndex(o => o.ID === currentOrderId);
        if (index === -1) return;

        orders[index] = {
            ...orders[index],
            FlowerName: document.getElementById('updateFlowerName').value,
            jiage: parseInt(document.getElementById('updatePrice').value),
            shuliang: parseInt(document.getElementById('updateQuantity').value),
            Date: document.getElementById('updateDate').value,
            yuango: document.getElementById('updateSalesman').value
        };

        showMessage('修改成功！', 'success');
        setTimeout(() => showAllOrders(), 1500);
    }

    // 确认操作
    function confirmAction() {
        if (currentOperation === 'delete') {
            orders.splice(currentOrderId, 1);
            showMessage('删除成功！', 'success');
            setTimeout(() => showDeleteForm(), 1500);
        }
        closeModal();
    }

    // 返回主菜单
    function backToMenu() {
        document.getElementById('mainMenu').style.display = 'grid';
        document.getElementById('contentArea').style.display = 'none';
        document.getElementById('dynamicContent').innerHTML = '';
    }

    // 退出系统
    function exitSystem() {
        if (confirm('确定要退出系统吗？')) {
            document.body.innerHTML = '<div style="display: flex; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; font-size: 32px;">🌸 感谢使用七彩鲜花销售管理系统 🌸</div>';
        }
    }

    // 显示消息
    function showMessage(message, type) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${type}`;
        msgDiv.style.display = 'block';
        msgDiv.textContent = message;

        const content = document.getElementById('dynamicContent');
        content.insertBefore(msgDiv, content.firstChild);

        setTimeout(() => msgDiv.remove(), 3000);
    }

    // 模态框相关
    function showModal(title, message) {
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('modalMessage').textContent = message;
        document.getElementById('confirmModal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('confirmModal').style.display = 'none';
    }

    // 点击模态框外部关闭
    window.onclick = function (event) {
        const modal = document.getElementById('confirmModal');
        if (event.target === modal) {
            closeModal();
        }
    }
</script>
</body>
</html>
